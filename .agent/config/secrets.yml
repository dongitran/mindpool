repo: dongitran/mindpool
environment: null
type: secret

secrets:
  # GCP project ID — used to tag and push Docker images to GCR (gcr.io/<project>/...)
  # Bitwarden: Google Cloud Platform/
  - name: GCP_INFRA_PROJECT_ID
    bitwarden: GCP_INFRA_PROJECT_ID_GCP_INFRA

  # GCP Service Account JSON (Editor + Container Admin) — push images + deploy via Pulumi
  # Bitwarden: Google Cloud Platform/
  - name: GCP_INFRA_CREDENTIALS
    bitwarden: GCP_SERVICE_ACCOUNT_GCP_INFRA

  # Pulumi Cloud access token — run pulumi up in GitHub Actions
  # Bitwarden: Token/
  - name: PULUMI_ACCESS_TOKEN
    bitwarden: PULUMI_ACCESS_TOKEN_GCP_INFRA

  # MongoDB connection string — injected as Pulumi secret (mindpool-infra:mongodbUrl)
  # Bitwarden: Project Secret/
  - name: MINDPOOL_MONGO_URI
    bitwarden: GCP_INFRA_MONGODB_URI

  # Redis connection string — injected as Pulumi secret (mindpool-infra:redisUrl)
  # Bitwarden: Project Secret/
  - name: MINDPOOL_REDIS_URL
    bitwarden: GCP_INFRA_REDIS_URI

  # Kimi API key — injected as Pulumi secret (mindpool-infra:kimiApiKey)
  # Bitwarden: Project Secret/
  - name: MINDPOOL_KIMI_API_KEY
    bitwarden: KIMI_API_KEY_MINH_NGUYEN_VAN

  # MiniMax API key — injected as Pulumi secret (mindpool-infra:minimaxApiKey)
  # Bitwarden: Project Secret/
  - name: MINDPOOL_MINIMAX_API_KEY
    bitwarden: MINIMAX_API_KEY_DONG_TT
