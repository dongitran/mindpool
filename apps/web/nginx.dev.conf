server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so nginx doesn't fail at startup
    # if 'server' container isn't up yet (set $upstream defers resolution)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Forward /health to Express server
    location = /health {
        set $upstream http://server:3001;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Forward /api/* to Express server
    location /api/ {
        set $upstream http://server:3001;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Forward /stream/* to Express SSE (disable buffering)
    location /stream/ {
        set $upstream http://server:3001;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # SPA fallback routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
