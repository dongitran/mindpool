name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'plans/**'
      - 'docs/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'
      - 'plans/**'
      - 'docs/**'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm turbo test --filter=!@mindpool/e2e
      - name: Spell check
        run: npx cspell "**/*.{ts,tsx,js,json,yml,yaml}" --no-progress
